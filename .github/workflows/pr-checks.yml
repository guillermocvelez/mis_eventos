name: Pull Request Checks

on:
  pull_request:
    branches:
      - main

jobs:
  frontend-tests:
    name: Frontend tests and coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front_end

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front_end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --run

      - name: Run coverage
        run: npm run test:coverage

  backend-tests:
    name: Backend tests and coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back_end

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80